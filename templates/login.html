<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnBot — Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <div class="bg-grid"></div>
    <div class="glow-orb orb-1"></div>

    <!-- Back to home -->
    <a href="{{ url_for('index') }}" class="back-link">← LearnBot</a>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="brand-icon large">⬡</span>
                <h2>Welcome back</h2>
                <p>Sign in to continue your learning journey</p>
            </div>

            {% if error %}
            <div class="alert alert-error">⚠ {{ error }}</div>
            {% endif %}

            <form action="{{ url_for('login') }}" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary btn-full">Sign In</button>
            </form>

            <p class="auth-switch">
                Don't have an account? <a href="{{ url_for('register') }}">Create one free</a>
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
